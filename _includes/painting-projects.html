<div class="media-projects">

  {% for project in site.data.paintings.projects %}
    {% assign project_id = project.title | slugify %}

    <section class="media-project" id="{{ project_id }}">

      <header class="media-project__header">

        {% if project.description %}
          <p class="media-project__description">
            {{ project.description | newline_to_br }}
          </p>
        {% endif %}

      </header>

      <div class="media-grid">

        {% for work in project.works %}

          <figure class="media-card">

            <a
              class="media-card__image-link image-popup"
              href="{{ work.image | relative_url }}"
              title="{% if work.caption %}{{ work.title }} — {{ work.caption }}{% else %}{{ work.title }}{% endif %}"
              aria-label="View full-size image of {{ work.title }}"
            >
              <img
                src="{{ work.image | relative_url }}"
                alt="{{ work.title }}"
                loading="lazy"
              >
            </a>

            <figcaption class="media-card__caption">

              <span class="media-card__title">
                {{ work.title }}
              </span>

              {% if work.caption %}
                <span class="media-card__description">
                  {{ work.caption }}
                </span>
              {% endif %}

            </figcaption>

          </figure>

        {% endfor %}

      </div>

    </section>

  {% endfor %}

</div>
