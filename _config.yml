title: "Richard Jerousek"
name: "Richard Jerousek"
description: "Personal website for Richard Jerousek"
url: "https://richardjerousek.com"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes"

include:
  - _pages

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

minimal_mistakes_skin: "default"

author:
  name: "Dr. Richard Jerousek"
  avatar: "/assets/images/profile_pic.png"
  bio: "astrophysicist, composer, artist, garbageman, teacher, etc."
  location: "Null Island"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/rjerousek"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/rjerousek"
    - label: "University of Central Florida"
      icon: "fas fa-fw fa-university"
      url: "https://sciences.ucf.edu/physics/person/richard-jerousek/"
    - label: "Robinson Observatory"
      icon: "fas fa-fw fa-telescope"
      url: "https://planets.ucf.edu/observatory"


defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true